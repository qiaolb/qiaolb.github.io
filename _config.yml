# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: This is JOE
subtitle: Hello World！
description: 生活不只是代码，还有诗和远方！
keywords: "Kubernetes, Azure, 云原生，DevOps, JavaScript, 容器技术，CI/CD, Docker, 微软云，云存储"
author: Qiao Libo
author_link: https://qiaolb.github.io/about/
language: zh-Hans
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://qiaolb.github.io
root: /
permalink: :title.html
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Custom file paths (NexT 8.x)
custom_file_path:
  sidebar: source/_data/sidebar.njk

# Writing
new_post_name: :year-:month-:day-:title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 15
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Open Graph
## https://hexo.io/docs/helpers#open-graph
open_graph:
  twitter_id: qiaolibo
  google_plus:
  fb_admins:
  fb_app_id:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next

# Theme Configuration (NexT 8.x)
# See: https://theme-next.js.org/docs/getting-started/
cache:
  enable: true

minify: false

scheme: Pisces
darkmode: true

menu:
  home: / || fa fa-home
  about: /about/ || fa fa-user
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags
  archives: /archives/ || fa fa-archive

menu_settings:
  icons: true
  badges: false

sidebar:
  position: left
  display: post
  padding: 18
  offset: 12

avatar:
  url: /images/avatar.png
  rounded: false
  rotated: false

site_state: true

social:
  GitHub: https://github.com/qiaolb || fab fa-github
  Weibo: http://weibo.com/qiaolibo || fab fa-weibo
  Twitter: https://twitter.com/qiaolibo || fab fa-twitter

social_icons:
  enable: true
  icons_only: false
  transition: false

toc:
  enable: true
  number: true
  wrap: false
  expand_all: false
  max_depth: 6

footer:
  since: 2016
  icon:
    name: user
    animated: false
    color: "#808080"
  powered: true
  beian:
    enable: false

creative_commons:
  license: by-nc-sa
  size: small
  sidebar: false
  post: false

post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: false
    another_day: true
  categories: true

reward_settings:
  enable: true
  animation: false
  comment: 坚持原创技术分享，您的支持将鼓励我继续创作！

reward:
  alipay: /images/alipay.png

back2top:
  enable: true
  sidebar: false
  scrollpercent: false

reading_progress:
  enable: true
  position: top
  color: "#37c6c0"
  height: 3px

motion:
  enable: true
  async: false
  transition:
    post_block: fadeIn
    post_header: slideDownIn
    post_body: slideDownIn
    coll_header: slideLeftIn
    sidebar: slideUpIn

fancybox: true

codeblock:
  copy_button:
    enable: true
    show_result: true
    style: default

lazyload: true

local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: false

baidu_analytics: 5e9cccd25fa530ec8126bd05056818ae
baidu_site_verification: code-3CvDMuQpdf
baidu_push: true

font:
  enable: true
  host: https://fonts.loli.net
  global:
    external: true
    family: Monda
  headings:
    external: true
    family: Roboto Slab
  codes:
    external: true
    family: PT Mono

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/qiaolb/qiaolb.github.io
  branch: gh-pages

html_minifier:
  enable: true
  ignore_error: false
  exclude:

css_minifier:
  enable: true
  exclude:
    - '*.min.css'

js_minifier:
  enable: true
  mangle: true
  output:
  compress:
  exclude:
    - '*.min.js'